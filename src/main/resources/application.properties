spring.application.name=stalzone-chatbot

# ============================================================
# DATASOURCE — H2 in-memory (dev only)
# When you move to Postgres, swap these three lines for:
#   spring.datasource.url=jdbc:postgresql://localhost:5432/stalzone
#   spring.datasource.driverClassName=org.postgresql.Driver
#   spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ============================================================
spring.datasource.url=jdbc:h2:mem:stalzonedb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 console — access at http://localhost:8080/h2-console during dev
# JDBC URL to enter in the console: jdbc:h2:mem:stalzonedb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / HIBERNATE
# ============================================================
# create-drop: schema is built on startup, torn down on shutdown.
# Honest for in-memory dev — makes it clear the DB is ephemeral.
# Switch to 'validate' + Flyway/Liquibase when you move to Postgres.
spring.jpa.hibernate.ddl-auto=create-drop

# Logs the actual SQL Hibernate runs — invaluable for debugging queries
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# SPRING AI — OpenRouter (OpenAI-compatible)
# ============================================================
# API key is read from the environment variable OPENROUTER_API_KEY.
# Never hardcode secrets here — this file is committed to Git.
# Set the env var in your shell or in a local .env file (see .gitignore).
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api/v1

# The model to use — pick a free OpenRouter model.
# Full list at https://openrouter.ai/models?q=free
# Example free models (verify availability on OpenRouter):
#   meta-llama/llama-3.3-70b-instruct:free
#   google/gemma-3-27b-it:free
#   mistralai/mistral-7b-instruct:free
spring.ai.openai.chat.options.model=meta-llama/llama-3.3-70b-instruct:free

# ============================================================
# GITHUB DATA SOURCE
# ============================================================
# GitHub owner/repo containing Stalzone game data.
# Externalised here so you can swap repos without touching Java code.
stalzone.github.repo=EXBO-Studio/stalzone-database
stalzone.github.api-host=https://api.github.com
stalzone.github.raw-host=https://raw.githubusercontent.com
stalzone.github.item-path-prefix=global/items/weapon/